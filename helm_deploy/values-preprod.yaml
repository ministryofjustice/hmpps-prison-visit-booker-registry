---
# Per environment values which override defaults in hmpps-prison-visit-booker-registry/values.yaml

generic-service:
  replicaCount: 2

  ingress:
    host: hmpps-prison-visit-booker-registry-preprod.prison.service.justice.gov.uk

  env:
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.dev.json
    HMPPS_AUTH_URL: https://sign-in-preprod.hmpps.service.justice.gov.uk/auth
    PRISONER_SEARCH_URL: https://prisoner-search-preprod.prison.service.justice.gov.uk
    VISIT-SCHEDULER_API_URL: https://visit-scheduler-preprod.prison.service.justice.gov.uk
    PRISONER-CONTACT_REGISTRY_URL: https://prisoner-contact-registry-preprod.prison.service.justice.gov.uk
    FEATURE_EVENTS_SNS_ENABLED: true
    SQS_DOMAIN_EVENT_PROCESSING_ENABLED: true

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: visits-alerts-nonprod
  sqsAlertsQueueNames:
    - "book-a-prison-visit-preprod-hmpps_prison_visits_create_contact_event_queue"
    - "book-a-prison-visit-preprod-hmpps_prison_visits_create_contact_event_dlq"
  sqsAlertsOldestThreshold: 1
  sqsAlertsTotalMessagesThreshold: 1

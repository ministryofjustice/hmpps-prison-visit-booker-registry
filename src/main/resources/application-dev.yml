server:
  port: 8083
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

spring:
  datasource:
    url: jdbc:postgresql://localhost:5444/prison_visit_booker_registry
    username: prison_visit_booker_registry
    password: prison_visit_booker_registry

hmpps.auth.url: https://sign-in-dev.hmpps.service.justice.gov.uk/auth

prisoner.search.url: https://prisoner-search-dev.prison.service.justice.gov.uk
visit-scheduler.api.url: https://visit-scheduler-dev.prison.service.justice.gov.uk
#visit-scheduler.api.url:  http://localhost:8081
prisoner-contact.registry.url: https://prisoner-contact-registry-dev.prison.service.justice.gov.uk

hmpps:
  sqs:
    enabled: true
    provider: localstack
    queues:
      prisonvisitsbookerevents:
        queueName: sqs_hmpps_visits_booker_events_queue
        dlqName: sqs_hmpps_visits_booker_events_dlq
        subscribeTopicId: domainevents
        dlqMaxReceiveCount: 1
        visibilityTimeout: 1

    topics:
      domainevents:
        arn: arn:aws:sns:eu-west-2:000000000000:${random.uuid}

domain-event-processing:
  enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true